docker_ubuntu_remove_conflicting: true
docker_ubuntu_conflicting_packages:
  - docker.io
  - docker-compose
  - docker-compose-v2
  - docker-doc
  - podman-docker
  - containerd
  - runc

docker_ubuntu_prereq_packages:
  - ca-certificates
  - curl

docker_ubuntu_keyring_dir: /etc/apt/keyrings
docker_ubuntu_keyring_path: /etc/apt/keyrings/docker.asc

docker_ubuntu_repo_uri: https://download.docker.com/linux/ubuntu
docker_ubuntu_repo_components:
  - stable

docker_ubuntu_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_ubuntu_service_name: docker
